            }

            function normalizeDept(value) {
                var dept = normalizeText(value);
                if (dept === 'ASSY') {
                    return 'ASSEMBLY';
                }
                if (dept === 'MANUFACTURING') {
                    return 'MANUFACTURING';
                }
                if (dept === 'MANU') {
                    return 'MANU';
                }
                return dept;
            }

            function getDeptLabel(value) {
                var dept = normalizeDept(value);
                if (dept === 'CP/OLB') {
                    return 'CP/OLB';
                }
                if (dept === 'LAMI') {
                    return 'Lami';
                }
                if (dept === 'ASSEMBLY') {
                    return 'Assembly';
                }
                if (dept === 'MANU' || dept === 'MANUFACTURING') {
                    return 'Manufacturing';
                }
                if (dept === 'QA') {
                    return 'QA';
                }
                return String(value || '');
            }

            function getDeptColorClass(value) {
                var dept = normalizeDept(value);
                if (dept === 'CP/OLB') {
                    return 'dept-cp-olb';
                }
                if (dept === 'LAMI') {
                    return 'dept-lami';
                }
                if (dept === 'ASSEMBLY') {
                    return 'dept-assembly';
                }
                if (dept === 'MANU' || dept === 'MANUFACTURING') {
                    return 'dept-manu';
                }
                if (dept === 'QA') {
                    return 'dept-qa';
                }
                return 'dept-default';
            }

            function isHighlightedLine(item) {
                var dept = normalizeDept(item.DEPT);
                var line = normalizeText(item.LINE);
                return dept === 'ASSEMBLY' && (line === 'MTP WFD' || line === 'UL');
            }

            function groupData(records) {
                var grouped = {};
                var productOrder = [];
                var i;

                for (i = 0; i < records.length; i++) {
                    var record = records[i];
                    var productKey = normalizeText(record.PROD_TYPE);
                    var deptKey = normalizeDept(record.DEPT);

                    if (!grouped[productKey]) {
                        grouped[productKey] = {
                            productType: productKey,
                            totalManpower: 0,
                            departments: {},
                            deptOrder: []
                        };
                        productOrder.push(productKey);
                    }

                    grouped[productKey].totalManpower += toNumber(record.MANPOWER);

                    if (!grouped[productKey].departments[deptKey]) {
                        grouped[productKey].departments[deptKey] = {
                            deptKey: deptKey,
                            productType: productKey,
                            deptLabel: getDeptLabel(record.DEPT),
                            totalManpower: 0,
                            items: []
                        };
                        grouped[productKey].deptOrder.push(deptKey);
                    }

                    grouped[productKey].departments[deptKey].totalManpower += toNumber(record.MANPOWER);
                    grouped[productKey].departments[deptKey].items.push(record);
                }

                return {
                    grouped: grouped,
                    productOrder: productOrder
                };
            }

            function sortDepartments(deptKeys) {
                deptKeys.sort(function (a, b) {
                    var indexA = getDeptSortIndex(a);
                    var indexB = getDeptSortIndex(b);
                    if (indexA === indexB) {
                        if (a < b) {
                            return -1;
                        }
                        if (a > b) {
                            return 1;
                        }
                        return 0;
                    }
                    return indexA - indexB;
                });
                return deptKeys;
            }

            function getDeptSortIndex(deptKey) {
                var i;
                for (i = 0; i < DEPT_ORDER.length; i++) {
                    if (DEPT_ORDER[i] === deptKey) {
                        return i;
                    }
                }
                return DEPT_ORDER.length + 1;
            }

            function renderEmpCount(empCount, deptClass) {
                var count = parseInt(empCount, 10);
                var html = '';
                var visible = 0;
                var i;

                if (isNaN(count) || count <= 0) {
                    return '&nbsp;';
                }

                visible = count;
                if (visible > MAX_VISIBLE_EMP_ICONS) {
                    visible = MAX_VISIBLE_EMP_ICONS;
                }

                for (i = 0; i < visible; i++) {
                    html += '<span class="emp-icon ' + deptClass + '"></span>';
                }

                if (count > MAX_VISIBLE_EMP_ICONS) {
                    html += '<span class="emp-plus">+' + (count - MAX_VISIBLE_EMP_ICONS) + '</span>';
                }

                return html;
            }

            function getLineCardStyle(itemCount) {
                var width = 100;
                if (itemCount > 0) {
                    width = 100 / itemCount;
                }
                return ' style="width:' + width.toFixed(4) + '%;"';
            }

            function getDeptWidthStyle(itemCount) {
                var width = 560;
                if (itemCount <= 4) {
                    width = 560;
                } else if (itemCount === 5) {
                    width = 650;
                } else if (itemCount === 6) {
                    width = 760;
                } else if (itemCount === 7) {
                    width = 860;
                } else {
                    width = 980;
                }
                return ' style="width:' + width + 'px;"';
            }

            function shouldUseWideDept(productType, deptKey) {
                return normalizeText(productType) === 'YOUM' && normalizeDept(deptKey) === 'ASSEMBLY';
            }

            function renderLineCard(item, itemCount) {
                var deptClass = getDeptColorClass(item.DEPT);
                var lineBoxClass = 'line-box';
                var textClass = 'line-box-text';
                var cardClass = 'line-card';
                var empClass = 'line-emp';
                var manpowerClass = 'line-manpower';
                var manpowerText = '&nbsp;';
                if (isHighlightedLine(item)) {
                    lineBoxClass += ' is-highlight';
                }
                if (itemCount >= 7) {
                    textClass += ' compact';
                    cardClass += ' compact';
                    lineBoxClass += ' compact-box';
                    empClass += ' compact';
                    manpowerClass += ' compact';
                }
                if (itemCount >= 8) {
                    textClass += ' dense';
                    cardClass += ' dense';
                }

                if (toNumber(item.MANPOWER) > 0) {
                    manpowerText = escapeHtml(formatNumber(item.MANPOWER));
                }

                return '' +
                    '<div class="' + cardClass + '"' + getLineCardStyle(itemCount) + '>' +
                        '<div class="' + lineBoxClass + '">' +
                            '<div class="' + textClass + '">' + escapeHtml(item.LINE) + '</div>' +
                        '</div>' +
                        '<div class="' + empClass + '">' + renderEmpCount(item.EMP_COUNT, deptClass) + '</div>' +
                        '<div class="' + manpowerClass + '">' + manpowerText + '</div>' +
                    '</div>';
            }

            function renderDeptCard(deptData, isLast) {
                var itemsHtml = '';
                var i;
                var cardClass = 'dept-card';
                var itemCount = deptData.items.length;
                if (isLast) {
                    cardClass += ' last';
                }
                if (shouldUseWideDept(deptData.productType, deptData.deptKey)) {
                    cardClass += ' is-wide';
                }

                for (i = 0; i < deptData.items.length; i++) {
                    itemsHtml += renderLineCard(deptData.items[i], itemCount);
                }

                return '' +
                    '<div class="' + cardClass + '"' + getDeptWidthStyle(itemCount) + '>' +
                        '<div class="dept-heading">' + escapeHtml(deptData.deptLabel) + ' &rarr; <span class="dept-heading-total">' + escapeHtml(formatNumber(deptData.totalManpower)) + ' POS</span></div>' +
                        '<div class="dept-frame">' +
                            '<div class="line-list">' + itemsHtml + '</div>' +
                        '</div>' +
                    '</div>';
            }

            function renderProductSection(sectionData) {
                var deptKeys = sortDepartments(sectionData.deptOrder.slice(0));
                var html = '';
                var i;

                html += '' +
                    '<div class="product-section">' +
                        '<div class="product-header">' +
                            '<span class="product-pill">' + escapeHtml(sectionData.productType) + '</span>' +
                            '<span class="product-total">&#9642; Total Direct Positions: <span class="product-total-value">' + escapeHtml(formatNumber(sectionData.totalManpower)) + ' Pos&rsquo;</span></span>' +
                        '</div>' +
                        '<div class="dept-track">';

                for (i = 0; i < deptKeys.length; i++) {
                    var deptKey = deptKeys[i];
                    html += renderDeptCard(sectionData.departments[deptKey], i === deptKeys.length - 1);
                    if (i < deptKeys.length - 1) {
                        html += '<div class="dept-arrow"><span class="dept-arrow-icon">&rarr;</span></div>';
                    }
                }

                html += '' +
                        '</div>' +
                    '</div>';

                return html;
            }

            function renderDashboard(records) {
                var groupedResult = groupData(records);
                var grouped = groupedResult.grouped;
                var productOrder = groupedResult.productOrder;
                var html = '';
                var i;

                for (i = 0; i < productOrder.length; i++) {
                    html += renderProductSection(grouped[productOrder[i]]);
                }

                return html;
            }

            function shouldIgnoreDrag(target) {
                var tagName = '';
                if (!target || !target.tagName) {
                    return false;
                }
                tagName = String(target.tagName).toUpperCase();
                return tagName === 'INPUT' || tagName === 'TEXTAREA' || tagName === 'SELECT' || tagName === 'BUTTON' || tagName === 'A';
            }

            function beginDrag(event) {
                if (shouldIgnoreDrag(event.target)) {
                    return;
                }
                if (event.which && event.which !== 1) {
                    return;
                }
                if (!viewport) {
                    return;
                }
                isPointerDown = true;
                startX = event.clientX;
                startY = event.clientY;
                startScrollLeft = viewport.scrollLeft;
                startScrollTop = viewport.scrollTop;
                if (viewport.className.indexOf('is-dragging') === -1) {
                    viewport.className += viewport.className ? ' is-dragging' : 'is-dragging';
                }
                if (event.preventDefault) {
                    event.preventDefault();
                }
            }

            function moveDrag(event) {
                var deltaX = 0;
                var deltaY = 0;
                if (!isPointerDown) {
                    return;
                }
                deltaX = event.clientX - startX;
                deltaY = event.clientY - startY;
                viewport.scrollLeft = startScrollLeft - deltaX;
                viewport.scrollTop = startScrollTop - deltaY;
                if (event.preventDefault) {
                    event.preventDefault();
                }
            }

            function endDrag() {
                if (!isPointerDown) {
                    return;
                }
                isPointerDown = false;
                viewport.className = viewport.className.replace(/\bis-dragging\b/g, '').replace(/\s{2,}/g, ' ').replace(/^\s+|\s+$/g, '');
            }

            function updateCountdown() {
                var countdownNode = document.getElementById('countdown');

                if (countdownNode) {
                    countdownNode.innerHTML = countdownSeconds + 's';
                }

                if (countdownSeconds <= 0) {
                    window.location.reload();
                    return;
                }

                countdownSeconds -= 1;
            }

            function startCountdown() {
                countdownSeconds = COUNTDOWN_START;
                updateCountdown();

                if (countdownInterval) {
                    window.clearInterval(countdownInterval);
                }

                countdownInterval = window.setInterval(updateCountdown, 1000);
            }

            document.getElementById('app').innerHTML = renderDashboard(rawData);
            viewport = document.getElementById('viewport');
            viewport.onmousedown = beginDrag;
            viewport.onmousemove = moveDrag;
            viewport.onmouseup = endDrag;
            viewport.onmouseleave = endDrag;
            document.ondragstart = function () {
                return false;
            };
            startCountdown();
        }());
    </script>
</body>
</html>
